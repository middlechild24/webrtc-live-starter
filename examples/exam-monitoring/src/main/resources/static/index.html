<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试监控演示 - WebRTC Live Starter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 8px; color: #e74c3c; }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .tab { padding: 8px 20px; background: #16213e; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; color: #888; border: none; }
        .tab.active { background: #e74c3c; color: #fff; font-weight: 600; }
        
        .config { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; font-size: 13px; color: #888; flex-wrap: wrap; }
        .config input { padding: 6px 10px; border: 1px solid #333; border-radius: 4px; background: #16213e; color: #eee; font-size: 13px; width: 80px; }
        .config select { padding: 6px 10px; border: 1px solid #333; border-radius: 4px; background: #16213e; color: #eee; font-size: 13px; }
        
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #e74c3c; color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #c0392b; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-success { background: #2ecc71; color: #fff; }
        
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .video-card { background: #16213e; border-radius: 8px; overflow: hidden; }
        .video-card .label { padding: 8px 12px; font-size: 12px; color: #888; background: #0f3460; }
        .video-card .video-wrap { background: #000; min-height: 200px; position: relative; }
        .video-card video { width: 100%; display: block; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        
        /* 监考端 — 考生列表 */
        .student-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
        .student-card { background: #16213e; border-radius: 8px; padding: 12px; cursor: pointer; border: 2px solid transparent; transition: all .2s; text-align: center; }
        .student-card:hover { border-color: #e74c3c; }
        .student-card.active { border-color: #e74c3c; background: #1a0a0a; }
        .student-card .name { font-weight: 600; font-size: 14px; }
        .student-card .status { font-size: 12px; color: #888; margin-top: 4px; }
        .monitor-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .status-badge { padding: 8px 12px; border-radius: 4px; font-size: 13px; display: inline-block; }
        .status-badge.connected { background: #0a3d0a; color: #2ecc71; }
        .status-badge.disconnected { background: #3d0a0a; color: #e74c3c; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛡 考试监控演示</h1>
    <p class="subtitle">摄像头监控 + 屏幕共享 = 双路 WebRTC 推流</p>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('student')">👨‍🎓 考生端（推流）</button>
        <button class="tab" onclick="switchTab('proctor')">👀 监考端（拉流）</button>
    </div>
    
    <!-- 考生端 -->
    <div id="studentPanel">
        <div class="config">
            <label>考试ID:</label><input id="examId" value="1001">
            <label>考生ID:</label><input id="sUserId" value="1">
            <label>姓名:</label><input id="sUserName" value="张三" style="width:100px">
        </div>
        <div class="controls">
            <button id="btnStartExam" class="btn-primary" onclick="startExam()">🚀 开始考试（开启监控）</button>
            <button id="btnEndExam" class="btn-danger" onclick="endExam()" disabled>⏹ 结束考试</button>
            <span id="examStatus" class="status-badge disconnected">● 未开始</span>
        </div>
        <div class="video-grid">
            <div class="video-card">
                <div class="label">📷 摄像头（人脸监控）</div>
                <div class="video-wrap" id="cameraWrap">
                    <video id="cameraVideo" autoplay playsinline muted></video>
                </div>
            </div>
            <div class="video-card">
                <div class="label">🖥 屏幕共享（桌面监控）</div>
                <div class="video-wrap" id="screenWrap">
                    <video id="screenVideoLocal" autoplay playsinline muted></video>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 监考端 -->
    <div id="proctorPanel" style="display:none">
        <div class="config">
            <label>监考老师ID:</label><input id="proctorId" value="99">
        </div>
        <div class="controls">
            <button class="btn-primary" onclick="refreshStudents()">🔄 刷新考生列表</button>
        </div>
        
        <div class="student-grid" id="studentList">
            <div class="student-card" style="color:#888">暂无考生 — 等待考生开始考试</div>
        </div>
        
        <h3 style="margin:16px 0">当前监控: <span id="monitoringName">未选择</span></h3>
        <div class="monitor-detail" id="monitorDetail">
            <div class="video-card">
                <div class="label">📷 摄像头</div>
                <div class="video-wrap" id="proctorCamera">
                    <video id="proctorCameraVideo" autoplay playsinline></video>
                </div>
            </div>
            <div class="video-card">
                <div class="label">🖥 屏幕</div>
                <div class="video-wrap" id="proctorScreen">
                    <video id="proctorScreenVideo" autoplay playsinline></video>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { Room, RoomEvent, Track } from '/js/livekit-client.esm.mjs';

let currentTab = 'student';
let studentRoom = null;    // 考生端的 LiveKit 连接
let proctorRoom = null;    // 监考端的 LiveKit 连接
let localStream = null;
let localScreenStream = null;
let roomName = '';
// 自动检测：用当前页面的 hostname，局域网其他电脑也能访问
let serverUrl = window.location.origin;
let livekitUrl = 'ws://' + window.location.hostname + ':7880';

// 考生列表（监考端使用）
let studentRooms = [];

window.switchTab = switchTab;
window.startExam = startExam;
window.endExam = endExam;
window.refreshStudents = refreshStudents;

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('studentPanel').style.display = tab === 'student' ? 'block' : 'none';
    document.getElementById('proctorPanel').style.display = tab === 'proctor' ? 'block' : 'none';
    if (tab === 'proctor') refreshStudents();
}

// ===== 考生端 =====

async function startExam() {
    const examId = document.getElementById('examId').value;
    const userId = document.getElementById('sUserId').value;
    const userName = document.getElementById('sUserName').value;
    
    try {
        // 1. 请求后端创建监控房间
        const resp = await fetch(serverUrl + '/api/exam/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ examId: parseInt(examId), userId: parseInt(userId), userName })
        });
        const data = await resp.json();
        roomName = data.roomName;
        
        // 2. 连接 LiveKit
        studentRoom = new Room();
        studentRoom.on(RoomEvent.Disconnected, () => {
            updateExamStatus(false);
        });
        
        await studentRoom.connect(livekitUrl, data.token);
        
        // 3. 开启摄像头
        localStream = await navigator.mediaDevices.getUserMedia({ 
            video: { width: 640, height: 480, frameRate: 15 }, 
            audio: false 
        });
        const cameraVideo = document.getElementById('cameraVideo');
        cameraVideo.srcObject = localStream;
        await studentRoom.localParticipant.publishTrack(localStream.getVideoTracks()[0], { source: Track.Source.Camera });
        
        // 4. 开启屏幕共享
        localScreenStream = await navigator.mediaDevices.getDisplayMedia({ 
            video: { width: 1920, height: 1080, frameRate: 10 } 
        });
        const screenVideo = document.getElementById('screenVideoLocal');
        screenVideo.srcObject = localScreenStream;
        await studentRoom.localParticipant.publishTrack(localScreenStream.getVideoTracks()[0], { source: Track.Source.ScreenShare });
        
        // 监听屏幕共享停止
        localScreenStream.getVideoTracks()[0].onended = () => {
            console.log('屏幕共享已停止');
        };
        
        updateExamStatus(true);
        console.log('监控已开启, room:', roomName);
        
    } catch (err) {
        alert('开启监控失败: ' + err.message);
        console.error(err);
    }
}

async function endExam() {
    if (studentRoom) {
        studentRoom.disconnect();
        studentRoom = null;
    }
    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
    }
    if (localScreenStream) {
        localScreenStream.getTracks().forEach(t => t.stop());
        localScreenStream = null;
    }
    
    // 通知后端销毁房间
    if (roomName) {
        try {
            await fetch(serverUrl + '/api/exam/end', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ roomName })
            });
        } catch(e) {}
    }
    
    updateExamStatus(false);
}

function updateExamStatus(active) {
    const statusEl = document.getElementById('examStatus');
    document.getElementById('btnStartExam').disabled = active;
    document.getElementById('btnEndExam').disabled = !active;
    
    if (active) {
        statusEl.textContent = '● 监控中';
        statusEl.className = 'status-badge connected';
    } else {
        statusEl.textContent = '● 未开始';
        statusEl.className = 'status-badge disconnected';
    }
}

// ===== 监考端 =====

function refreshStudents() {
    const container = document.getElementById('studentList');
    container.innerHTML = '<div class="student-card" style="color:#888">⏳ 正在加载考生列表...</div>';
    
    fetch(serverUrl + '/api/exam/rooms')
        .then(res => res.json())
        .then(data => {
            container.innerHTML = '';
            if (!data.rooms || data.rooms.length === 0) {
                container.innerHTML = '<div class="student-card" style="color:#888">暂无考生 — 等待考生开始考试</div>';
                return;
            }
            
            studentRooms = data.rooms;
            data.rooms.forEach(s => {
                const card = document.createElement('div');
                card.className = 'student-card';
                card.innerHTML = `<div class="name">${s.userName}</div><div class="status">🟢 考试中 · 房间: ${s.roomName}</div>`;
                card.onclick = () => selectStudent(s);
                container.appendChild(card);
            });
        })
        .catch(err => {
            container.innerHTML = '<div class="student-card" style="color:#e74c3c">⚠ 加载失败，请重试</div>';
            console.error('获取考生列表失败:', err);
        });
}

async function selectStudent(student) {
    // 高亮选中
    document.querySelectorAll('.student-card').forEach(c => c.classList.remove('active'));
    event.target.closest('.student-card').classList.add('active');
    document.getElementById('monitoringName').textContent = student.userName;
    
    // 先断开之前的监考连接
    if (proctorRoom) {
        proctorRoom.disconnect();
        proctorRoom = null;
    }
    
    try {
        const resp = await fetch(serverUrl + '/api/exam/monitor', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomName: student.roomName, proctorId: parseInt(document.getElementById('proctorId').value) })
        });
        const data = await resp.json();
        
        proctorRoom = new Room();
        
        // 处理远程轨道 — 用 Track.Source 枚举区分
        function handleRemoteTrack(track, pub) {
            console.log('监考端收到轨道:', { kind: track.kind, source: pub.source, name: track.name });
            if (track.kind === 'video') {
                const isScreen = pub.source === Track.Source.ScreenShare;
                const targetEl = isScreen 
                    ? document.getElementById('proctorScreenVideo')
                    : document.getElementById('proctorCameraVideo');
                track.attach(targetEl);
                // 在父容器上添加全屏按钮，避免与 video 元素交互冲突
                const wrap = targetEl.parentElement;
                if (!wrap.querySelector('.fullscreen-btn')) {
                    const btn = document.createElement('button');
                    btn.className = 'fullscreen-btn';
                    btn.innerHTML = '⛶';
                    btn.title = '全屏 / Esc退出';
                    Object.assign(btn.style, {
                        position: 'absolute', bottom: '8px', right: '8px',
                        zIndex: '10', background: 'rgba(0,0,0,0.6)', color: '#fff',
                        border: 'none', borderRadius: '4px', padding: '4px 8px',
                        cursor: 'pointer', fontSize: '16px'
                    });
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        if (document.fullscreenElement) {
                            document.exitFullscreen();
                        } else {
                            targetEl.requestFullscreen();
                        }
                    };
                    wrap.appendChild(btn);
                }
                console.log(isScreen ? '屏幕轨道已附加' : '摄像头轨道已附加');
            }
        }
        
        // 1. 新推流事件 (track, publication, participant)
        proctorRoom.on(RoomEvent.TrackSubscribed, (track, publication) => handleRemoteTrack(track, publication));
        
        // 2. 已有参与者的已有轨道
        proctorRoom.on(RoomEvent.ParticipantConnected, (participant) => {
            console.log('参与者加入:', participant.identity, '已有track=', participant.videoTrackPublications.size);
            participant.videoTrackPublications.forEach(pub => {
                if (pub.track) {
                    handleRemoteTrack(pub.track, pub);
                } else {
                    pub.on('subscribed', (track) => handleRemoteTrack(track, pub));
                }
            });
        });
        
        await proctorRoom.connect(livekitUrl, data.token);
        console.log('正在监控:', student.userName, student.roomName);
        
        // 3. 处理已经在房间里的参与者（监考端后进入的情况）
        proctorRoom.remoteParticipants.forEach((participant, sid) => {
            console.log('已有远程参与者:', participant.identity);
            participant.videoTrackPublications.forEach(pub => {
                if (pub.track) {
                    handleRemoteTrack(pub.track, pub);
                } else {
                    pub.on('subscribed', (track) => handleRemoteTrack(track, pub));
                }
            });
        });
        
    } catch (err) {
        alert('连接失败: ' + err.message);
    }
}
</script>
</body>
</html>
