<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播演示 - WebRTC Live Starter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #00d4ff; }
        .main { display: flex; gap: 20px; }
        .video-panel { flex: 1; }
        .chat-panel { width: 320px; background: #16213e; border-radius: 8px; display: flex; flex-direction: column; }
        
        .video-container { background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 12px; min-height: 360px; position: relative; }
        .video-container video { width: 100%; display: block; }
        .placeholder { display: flex; align-items: center; justify-content: center; height: 360px; color: #666; font-size: 18px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all .2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: #00d4ff; color: #1a1a2e; }
        .btn-primary:hover:not(:disabled) { background: #00b8e6; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover:not(:disabled) { background: #c0392b; }
        .btn-success { background: #2ecc71; color: #fff; }
        .btn-success:hover:not(:disabled) { background: #27ae60; }
        
        .room-info { display: flex; gap: 16px; align-items: center; margin-bottom: 12px; font-size: 13px; color: #888; }
        .room-info input { padding: 6px 10px; border: 1px solid #333; border-radius: 4px; background: #16213e; color: #eee; font-size: 13px; }
        .room-info label { font-size: 12px; color: #666; }
        
        /* 聊天 */
        .chat-header { padding: 12px 16px; border-bottom: 1px solid #0f3460; font-weight: 600; font-size: 14px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 12px; }
        .msg { margin-bottom: 8px; font-size: 13px; line-height: 1.5; }
        .msg.system { color: #888; font-style: italic; text-align: center; }
        .msg .user { color: #00d4ff; font-weight: 600; }
        .msg .text { color: #ddd; }
        .chat-input { display: flex; padding: 10px; border-top: 1px solid #0f3460; }
        .chat-input input { flex: 1; padding: 8px 12px; border: 1px solid #333; border-radius: 4px; background: #1a1a2e; color: #eee; font-size: 13px; }
        .chat-input button { margin-left: 8px; padding: 8px 14px; font-size: 13px; }
        
        .status { padding: 8px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; }
        .status.connected { background: #0a3d0a; color: #2ecc71; }
        .status.disconnected { background: #3d0a0a; color: #e74c3c; }
        
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
        .tab { padding: 8px 20px; background: #16213e; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 14px; color: #888; border: none; }
        .tab.active { background: #00d4ff; color: #1a1a2e; font-weight: 600; }
        
        .screen-preview { width: 320px; height: 180px; background: #000; border-radius: 4px; overflow: hidden; }
        .screen-preview video { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
<div class="container">
    <h1>🎥 WebRTC 直播演示</h1>
    
    <div class="tabs">
        <button class="tab active" onclick="switchTab('teacher')">👨‍🏫 讲师端（推流）</button>
        <button class="tab" onclick="switchTab('student')">👨‍🎓 学员端（观看）</button>
    </div>
    
    <div class="room-info">
        <label>房间名:</label>
        <input id="roomName" value="demo-room" style="width:150px">
        <label>用户名:</label>
        <input id="userName" value="Teacher" style="width:120px">
        <span id="statusText" class="status disconnected">● 未连接</span>
    </div>
    
    <div class="main">
        <div class="video-panel">
            <!-- 讲师端：本地预览 + 屏幕共享 -->
            <div id="teacherPanel">
                <div class="controls">
                    <button id="btnCamera" class="btn-primary" onclick="toggleCamera()">📷 开启摄像头</button>
                    <button id="btnScreen" class="btn-success" onclick="toggleScreen()">🖥 共享屏幕</button>
                    <button id="btnConnect" class="btn-primary" onclick="connect()">🔗 连接房间</button>
                    <button id="btnDisconnect" class="btn-danger" onclick="disconnect()" disabled>❌ 断开</button>
                </div>
                <div class="video-container" id="localVideoContainer">
                    <div class="placeholder">摄像头画面将显示在这里</div>
                </div>
                <div class="screen-preview" id="screenPreview" style="display:none">
                    <video id="screenVideo" autoplay playsinline muted></video>
                </div>
            </div>
            
            <!-- 学员端：远程流 -->
            <div id="studentPanel" style="display:none">
                <div class="controls">
                    <button id="btnJoinRoom" class="btn-primary" onclick="connectAsStudent()">🔗 加入房间</button>
                    <button id="btnLeaveRoom" class="btn-danger" onclick="disconnect()" disabled>❌ 离开</button>
                </div>
                <div class="video-container" id="remoteVideoContainer">
                    <div class="placeholder">等待讲师推流...</div>
                </div>
            </div>
        </div>
        
        <!-- 聊天 -->
        <div class="chat-panel">
            <div class="chat-header">💬 聊天室 (<span id="onlineCount">0</span>人在线)</div>
            <div class="chat-messages" id="chatMessages">
                <div class="msg system">连接房间后即可聊天</div>
            </div>
            <div class="chat-input">
                <input id="chatInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendChat()">
                <button class="btn-primary" onclick="sendChat()">发送</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { Room, RoomEvent, Track, RemoteParticipant, LocalParticipant } from './js/livekit-client.esm.mjs';

// 全局状态
let currentTab = 'teacher';
let room = null;
let localVideoTrack = null;
let localScreenTrack = null;
let ws = null;
// 自动检测：用当前页面的 hostname，局域网其他电脑也能访问
let serverUrl = window.location.origin;
let livekitUrl = 'ws://' + window.location.hostname + ':7880';

// 导出到全局作用域
window.switchTab = switchTab;
window.toggleCamera = toggleCamera;
window.toggleScreen = toggleScreen;
window.connect = connect;
window.connectAsStudent = connectAsStudent;
window.disconnect = disconnect;
window.sendChat = sendChat;

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('teacherPanel').style.display = tab === 'teacher' ? 'block' : 'none';
    document.getElementById('studentPanel').style.display = tab === 'student' ? 'block' : 'none';
    if (tab === 'student') {
        document.getElementById('userName').value = 'Student';
    } else {
        document.getElementById('userName').value = 'Teacher';
    }
}

async function toggleCamera() {
    const btn = document.getElementById('btnCamera');
    if (localVideoTrack) {
        localVideoTrack.stop();
        localVideoTrack = null;
        if (room) room.localParticipant.unpublishTrack(localVideoTrack);
        btn.textContent = '📷 开启摄像头';
        btn.className = 'btn-primary';
        document.getElementById('localVideoContainer').innerHTML = '<div class="placeholder">摄像头画面将显示在这里</div>';
        return;
    }
    
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        localVideoTrack = stream; // 存储 stream 引用
        
        // 显示本地预览
        const container = document.getElementById('localVideoContainer');
        container.innerHTML = '';
        const videoEl = document.createElement('video');
        videoEl.autoplay = true;
        videoEl.muted = true;
        videoEl.playsInline = true;
        videoEl.srcObject = stream;
        videoEl.style.width = '100%';
        container.appendChild(videoEl);
        
        btn.textContent = '📷 关闭摄像头';
        btn.className = 'btn-danger';
        
        // 如果已连接房间，立即推流
        if (room && room.state === 'connected') {
            await room.localParticipant.publishTrack(stream.getVideoTracks()[0], { source: Track.Source.Camera });
        }
    } catch (err) {
        alert('摄像头访问失败: ' + err.message);
    }
}

async function toggleScreen() {
    const btn = document.getElementById('btnScreen');
    if (localScreenTrack) {
        localScreenTrack.stop();
        localScreenTrack = null;
        document.getElementById('screenPreview').style.display = 'none';
        btn.textContent = '🖥 共享屏幕';
        btn.className = 'btn-success';
        return;
    }
    
    try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
        localScreenTrack = stream;
        
        // 显示屏幕预览
        const preview = document.getElementById('screenPreview');
        preview.style.display = 'block';
        const videoEl = document.getElementById('screenVideo');
        videoEl.srcObject = stream;
        
        btn.textContent = '🖥 停止共享';
        btn.className = 'btn-danger';
        
        // 如果已连接，推屏幕流
        if (room && room.state === 'connected') {
            await room.localParticipant.publishTrack(stream.getVideoTracks()[0], { source: Track.Source.ScreenShare });
        }
    } catch (err) {
        alert('屏幕共享失败: ' + err.message);
    }
}

async function connect() {
    const roomName = document.getElementById('roomName').value;
    const userName = document.getElementById('userName').value;
    
    try {
        // 1. 请求后端创建房间 + 获取 token
        const resp = await fetch(serverUrl + '/api/demo/create-room', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomName, teacherName: userName })
        });
        const data = await resp.json();
        
        // 2. 连接 LiveKit 房间
        room = new Room();
        setupRoomEvents(room);
        
        await room.connect(livekitUrl, data.token);
        updateConnectionStatus(true);
        
        // 3. 如果已有本地流，推流
        if (localVideoTrack) {
            await room.localParticipant.publishTrack(localVideoTrack.getVideoTracks()[0], { source: Track.Source.Camera });
        }
        if (localScreenTrack) {
            await room.localParticipant.publishTrack(localScreenTrack.getVideoTracks()[0], { source: Track.Source.ScreenShare });
        }
        
        // 4. 连接聊天
        connectChat(roomName, userName);
        
    } catch (err) {
        alert('连接失败: ' + err.message);
        console.error(err);
    }
}

async function connectAsStudent() {
    const roomName = document.getElementById('roomName').value;
    const userName = document.getElementById('userName').value;
    
    try {
        const resp = await fetch(serverUrl + '/api/demo/join-room', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ roomName, studentName: userName })
        });
        const data = await resp.json();
        
        room = new Room();
        setupRoomEvents(room);
        
        await room.connect(livekitUrl, data.token);
        updateConnectionStatus(true);
        
        connectChat(roomName, userName);
    } catch (err) {
        alert('加入失败: ' + err.message);
        console.error(err);
    }
}

function setupRoomEvents(room) {
    // 远程参与者加入
    room.on(RoomEvent.ParticipantConnected, (participant) => {
        console.log('参与者加入:', participant.identity);
        addChatMessage('system', '', participant.identity + ' 加入了房间');
        // 如果参与者已有推流（讲师先推流、学员后加入），立即订阅
        participant.videoTrackPublications.forEach(pub => {
            if (pub.track) {
                handleRemoteTrack(pub.track, pub);
            } else {
                pub.on('subscribed', (track) => handleRemoteTrack(track, pub));
            }
        });
    });
    
    // 远程参与者离开
    room.on(RoomEvent.ParticipantDisconnected, (participant) => {
        console.log('参与者离开:', participant.identity);
        addChatMessage('system', '', participant.identity + ' 离开了房间');
    });
    
    // 远程轨道订阅（新推流事件）
    room.on(RoomEvent.TrackSubscribed, (track, publication, participant) => {
        console.log('收到轨道:', track.kind, '来自:', participant.identity);
        handleRemoteTrack(track, publication);
    });
    
    // 断开
    room.on(RoomEvent.Disconnected, () => {
        updateConnectionStatus(false);
        document.getElementById('remoteVideoContainer').innerHTML = '<div class="placeholder">等待讲师推流...</div>';
    });
}

// 统一的远程轨道处理函数
function handleRemoteTrack(track, publication) {
    if (track.kind === 'video') {
        const isScreen = publication.source === Track.Source.ScreenShare;
        const container = document.getElementById('remoteVideoContainer');
        if (isScreen) {
            // 屏幕共享 — 在已有视频容器下方追加
            let screenEl = document.getElementById('remoteScreenVideo');
            if (!screenEl) {
                const wrapper = document.createElement('div');
                wrapper.id = 'remoteScreenContainer';
                wrapper.style.cssText = 'background:#000;border-radius:8px;overflow:hidden;margin-top:12px;min-height:180px';
                screenEl = document.createElement('video');
                screenEl.id = 'remoteScreenVideo';
                screenEl.autoplay = true;
                screenEl.playsInline = true;
                screenEl.style.width = '100%';
                wrapper.appendChild(screenEl);
                container.parentElement.appendChild(wrapper);
            }
            track.attach(screenEl);
        } else {
            container.innerHTML = '';
            const videoEl = document.createElement('video');
            videoEl.autoplay = true;
            videoEl.playsInline = true;
            videoEl.style.width = '100%';
            track.attach(videoEl);
            container.appendChild(videoEl);
        }
    }
    if (track.kind === 'audio') {
        track.attach();
    }
}

function updateConnectionStatus(connected) {
    const statusEl = document.getElementById('statusText');
    const btnConnect = document.getElementById('btnConnect');
    const btnDisconnect = document.getElementById('btnDisconnect');
    const btnJoin = document.getElementById('btnJoinRoom');
    const btnLeave = document.getElementById('btnLeaveRoom');
    
    if (connected) {
        statusEl.textContent = '● 已连接';
        statusEl.className = 'status connected';
        if (btnConnect) btnConnect.disabled = true;
        if (btnDisconnect) btnDisconnect.disabled = false;
        if (btnJoin) btnJoin.disabled = true;
        if (btnLeave) btnLeave.disabled = false;
    } else {
        statusEl.textContent = '● 未连接';
        statusEl.className = 'status disconnected';
        if (btnConnect) btnConnect.disabled = false;
        if (btnDisconnect) btnDisconnect.disabled = true;
        if (btnJoin) btnJoin.disabled = false;
        if (btnLeave) btnLeave.disabled = true;
    }
}

async function disconnect() {
    if (room) {
        room.disconnect();
        room = null;
    }
    if (ws) {
        ws.close();
        ws = null;
    }
    updateConnectionStatus(false);
}

// ===== 聊天 =====

function connectChat(roomName, userName) {
    if (ws) ws.close();
    
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(protocol + '//' + window.location.host + '/ws/chat/' + roomName + '?userId=' + userName + '&userName=' + userName);
    
    ws.onopen = () => {
        // 连接成功后请求一次在线人数
        fetch(serverUrl + '/api/demo/online-count?roomName=' + roomName)
            .then(r => r.json())
            .then(data => {
                document.getElementById('onlineCount').textContent = data.count;
            })
            .catch(() => {});
    };
    
    ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'join') {
            addChatMessage('system', '', msg.content);
            document.getElementById('onlineCount').textContent = msg.onlineCount;
        } else if (msg.type === 'leave') {
            addChatMessage('system', '', msg.content);
            document.getElementById('onlineCount').textContent = msg.onlineCount;
        } else if (msg.type === 'chat') {
            addChatMessage('chat', msg.userName, msg.content);
        }
    };
    
    ws.onclose = () => {
        ws = null;
    };
}

function sendChat() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !ws) return;
    
    ws.send(text);
    input.value = '';
}

function addChatMessage(type, user, text) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    if (type === 'system') {
        div.textContent = text;
    } else {
        div.innerHTML = '<span class="user">' + user + ':</span> <span class="text">' + text + '</span>';
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}
</script>
</body>
</html>
